name: Bug
description: Report incorrect behavior.
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Example
      description: >
        Provide a minimal reproducible example.
    validations:
      required: true
  - type: textarea
    attributes:
      label: How to reproduce
      description: Describe how to reproduce the bug using the example.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Module(s)
      multiple: true
      options:
        - views
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Platform(s)
      multiple: true
      options:
        - Android
    validations:
      required: true
  - type: input
    attributes:
      label: Platform version(s)
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Vico version(s)
      description: For outdated versions, try updating Vico first.
      multiple: true
      options:
        - 3.1.0
        - 3.2.0-next.5
        - 2.5.0
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional information
