name: Dispatch bug report validation
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to check
        required: true
        type: number
jobs:
  dispatch-bug-report-validation:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
      github.event.issue.author_association != 'OWNER' &&
      github.event.issue.author_association != 'MEMBER' &&
      github.event.issue.author_association != 'COLLABORATOR' &&
      github.event.action == 'labeled' && github.event.label.name == 'bug'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      issues: read
    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi
      - name: Dispatch Claude validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run validate-bug-report.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            --field issue_number="${{ steps.issue.outputs.number }}"
