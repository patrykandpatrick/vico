name: Deploy web sample
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: >-
          Tag, branch, or commit to deploy. Defaults to the newest stable
          version tag.
        required: false
        type: string
jobs:
  deploy-web-sample:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'patrykandpatrick/vico' &&
      (github.event_name != 'release' || github.event.release.prerelease == false)
    environment:
      name: sample
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SAMPLE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Resolve ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            REF="${{ github.event.release.tag_name }}"
          else
            REF="${{ inputs.ref }}"
          fi

          if [ -z "$REF" ]; then
            REF=$(git tag --list 'v*' --sort=-version:refname | grep -Ev 'alpha|beta|next' | head -n1)
          fi

          if [ -z "$REF" ]; then
            echo "No ref to deploy."
            exit 1
          fi

          echo "REF=$REF" >> $GITHUB_ENV
      - name: Check out ref
        run: git checkout "$REF"
      - name: Build web sample
        run: ./gradlew :sample:web:wasmJsBrowserDistribution
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Link Vercel project
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Assemble Vercel build output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -R sample/web/build/dist/wasmJs/productionExecutable/. .vercel/output/static/
          echo '{ "version": 3 }' > .vercel/output/config.json
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed $REF to $URL" >> "$GITHUB_STEP_SUMMARY"
