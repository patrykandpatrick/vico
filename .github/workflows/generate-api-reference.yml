name: Generate API reference
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Version tag to generate.
        required: true
        type: string
jobs:
  generate-api-reference:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    if: github.repository == 'patrykandpatrick/vico'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: vico
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Resolve tag
        run: |
          TAG_NAME="${{ inputs.tag_name }}"

          if [ -z "$TAG_NAME" ]; then
            echo "No version tag provided."
            exit 1
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
      - name: Check out release tag
        run: |
          cd ${{ github.workspace }}/vico
          git checkout "$TAG_NAME"
      - name: Build current API reference
        run: |
          cd ${{ github.workspace }}/vico
          ./gradlew dokkaGenerate
      - name: Prepare API reference artifact
        run: |
          SITE_DIR=${{ github.workspace }}/site
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"
          cp -R ${{ github.workspace }}/vico/vico/build/dokka/html/. "$SITE_DIR"
          touch "$SITE_DIR/.nojekyll"
      - uses: actions/upload-artifact@v7
        with:
          name: views-api-reference-${{ env.TAG_NAME }}
          path: ${{ github.workspace }}/site
