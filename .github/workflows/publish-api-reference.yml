name: Publish API reference
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Version tag to publish. Defaults to the newest version tag.
        required: false
        type: string
jobs:
  publish-api-reference:
    runs-on: ubuntu-latest
    if: github.repository == 'patrykandpatrick/vico'
    environment:
      name: api-reference
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_REFERENCE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: vico
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Resolve tag
        run: |
          cd ${{ github.workspace }}/vico
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ inputs.tag_name }}"
          fi
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=$(
              git tag --list 'v*' |
                awk '
                  function prerelease_rank(label) {
                    if (label == "") return 3
                    if (label == "alpha") return 0
                    if (label == "beta") return 1
                    if (label == "next") return 2
                    return -1
                  }
                  {
                    tag = $0
                    version = substr(tag, 2)
                    split(version, parts, "-")
                    split(parts[1], core, ".")
                    label = ""
                    label_number = 0
                    if (length(parts) > 1) {
                      split(parts[2], prerelease_parts, ".")
                      label = prerelease_parts[1]
                      if (length(prerelease_parts) > 1) {
                        label_number = prerelease_parts[2]
                      }
                    }
                    printf "%06d %06d %06d %06d %06d %s\n", core[1], core[2], core[3], prerelease_rank(label), label_number, tag
                  }
                ' |
                sort -k1,1nr -k2,2nr -k3,3nr -k4,4nr -k5,5nr |
                head -n1 |
                cut -d' ' -f6
            )
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "No version tag found."
            exit 1
          fi

          VERSION_NAME=${TAG_NAME#v}
          IS_PRERELEASE=false
          echo "$VERSION_NAME" | grep -q "alpha\|beta\|next" && IS_PRERELEASE=true

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
      - name: Check out release tag
        run: |
          cd ${{ github.workspace }}/vico
          git checkout "$TAG_NAME"
      - name: Build current API reference
        run: |
          cd ${{ github.workspace }}/vico
          ./gradlew dokkaGenerate
      - name: Build site
        run: |
          SITE_DIR=${{ github.workspace }}/site
          rm -rf "$SITE_DIR" ${{ github.workspace }}/vico-stable
          mkdir -p "$SITE_DIR"

          if $IS_PRERELEASE; then
            cd ${{ github.workspace }}/vico
            STABLE_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -Ev 'alpha|beta|next' | head -n1)
            if [ -z "$STABLE_TAG" ]; then
              echo "No stable tag found."
              exit 1
            fi

            git worktree add ${{ github.workspace }}/vico-stable "$STABLE_TAG"
            cd ${{ github.workspace }}/vico-stable
            ./gradlew dokkaGenerate
            cp -R ${{ github.workspace }}/vico-stable/vico/build/dokka/html/. "$SITE_DIR"
            mkdir -p "$SITE_DIR/$TAG_NAME"
            cp -R ${{ github.workspace }}/vico/vico/build/dokka/html/. "$SITE_DIR/$TAG_NAME"
          else
            cp -R ${{ github.workspace }}/vico/vico/build/dokka/html/. "$SITE_DIR"
          fi
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Link Vercel project
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Assemble Vercel build output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -R ${{ github.workspace }}/site/. .vercel/output/static/
          echo '{ "version": 3 }' > .vercel/output/config.json
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed $TAG_NAME to $URL" >> "$GITHUB_STEP_SUMMARY"
