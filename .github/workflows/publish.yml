name: Publish
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'patrykandpatrick/vico'
    permissions:
      contents: write
      discussions: read
      id-token: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          path: vico
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          cd ${{ github.workspace }}/vico
          VERSION_NAME=$(grep -oP "(?<=const val VICO = \")[^\"]*" buildSrc/src/main/kotlin/Versions.kt)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION_NAME" >> $GITHUB_ENV
          IS_PRERELEASE=false
          echo $VERSION_NAME | grep -q "alpha\|beta\|next" && IS_PRERELEASE=true
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          ./gradlew assembleDebug
          cd sample/android/build/outputs/apk/debug
          mv android-debug.apk android-sample-debug.apk
      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
          TAG_NAME: ${{ env.TAG_NAME }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --model claude-opus-4-8 --add-dir "${{ github.workspace }}/vico"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)"]
              }
            }
          prompt: |
            /release-notes Write GitHub release notes for `${{ env.TAG_NAME }}`.

            The repository is checked out at `${{ github.workspace }}/vico`.
            Write only the final release body to `${{ runner.temp }}/release-notes.md`.
            Do not modify repository files.
      - run: |
          test -s "${{ runner.temp }}/release-notes.md"
          grep -q "^## Overview$" "${{ runner.temp }}/release-notes.md"
          cd ${{ github.workspace }}/vico
          test -z "$(git status --porcelain)"
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          body_path: ${{ runner.temp }}/release-notes.md
          files: ${{ github.workspace }}/vico/sample/android/build/outputs/apk/debug/android-sample-debug.apk
          prerelease: ${{ env.IS_PRERELEASE }}
          tag_name: ${{ env.TAG_NAME }}
      - run: |
          cd ${{ github.workspace }}/vico
          ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
