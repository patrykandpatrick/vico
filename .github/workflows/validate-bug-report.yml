name: Validate bug report
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to check
        required: true
        type: number
jobs:
  validate-bug-report-with-claude:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot]"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)"]
              }
            }
          prompt: |
            Check whether GitHub issue #${{ github.event.inputs.issue_number }} in this repository complies with the bug report template requirements.

            Fetch the issue first:

            ```sh
            gh issue view ${{ github.event.inputs.issue_number }} --repo ${{ github.repository }} --json title,body,author
            ```

            The issue body is rendered from a GitHub issue form. Each field appears as a `### Field name` section heading followed by the submitted value. The repository source code is checked out and available. Consult it when needed to verify that the example uses valid APIs and arguments.

            Assess the issue on these criteria:

            1. **Bug report** — The issue must describe confirmed incorrect behavior, not ask a question, request a feature, or seek usage help.

            2. **Example** — The template asks for a minimal reproducible example or the name of an affected sample chart. If the submission includes code, it must be self-contained: all referenced variables, functions, and types must be defined or clearly indicated as placeholders, and every API call must include its required arguments. A code snippet with undefined variables, missing parameters, or incomplete setup does not count as a minimal reproducible example. The example must also be minimal: it should contain only the code necessary to reproduce the bug. Unnecessary customization, complex data generation logic, unrelated features, and other code that is not needed to trigger the issue should be removed. If the example reproduces the bug but is bloated with unrelated code, it does not meet the minimality requirement.

            3. **How to reproduce** — The template asks for steps to reproduce the bug using the provided example. Does the submission genuinely satisfy that?

            **If the issue is compliant:** Do nothing. Output a brief summary confirming compliance.

            **If the issue is NOT compliant:**

            1. Post a comment on the issue with `gh issue comment` that:

               - Addresses the author by their GitHub username (@username)

               - Clearly lists each requirement that is not met and what needs to be provided

               - Explains that the issue has been closed, and asks them to address the problems and post a new comment so the team can take another look

            2. Close the issue as not planned:

               ```sh
               gh issue close ${{ github.event.inputs.issue_number }} --repo ${{ github.repository }} --reason "not planned"
               ```
          claude_args: --model claude-opus-4-8
